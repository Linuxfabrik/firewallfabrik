# Nftables platform compiler options.
#
# This file is the single source of truth for all nftables compiler
# option keys, their types, default values, widget mappings, and
# descriptions (used as GUI tooltips).
#
# Options with ``supported: false`` are present in the shared .ui file
# but are disabled because the nftables compiler does not use them.
#
# Keys are listed alphabetically for maintainability.

name: 'nftables'
description: 'Nftables platform compiler options'

options:

  accept_established:
    type: 'bool'
    default: true
    supported: true
    widget: 'acceptESTBeforeFirst'
    description: >-
      Accept packets belonging to connections already established or
      related to established connections. Adds automatic rules at the
      top of each access list.

  accept_new_tcp_with_no_syn:
    type: 'bool'
    default: true
    supported: true
    widget: 'acceptSessions'
    inverted: true
    description: >-
      Accept TCP sessions opened prior to firewall restart.
      The checkbox label shows inverted semantics ("Drop new TCP
      sessions that do not begin with SYN flag").

  action_on_reject:
    type: 'enum'
    default: ''
    supported: true
    widget: 'actionOnReject'
    values:
      - 'ICMP unreachable'
      - 'ICMP net unreachable'
      - 'ICMP host unreachable'
      - 'ICMP port unreachable'
      - 'ICMP net prohibited'
      - 'ICMP host prohibited'
      - 'TCP RST'
    description: >-
      ICMP message type or TCP RST sent back to the sender when a
      packet is rejected. Leave empty to use the system default.

  activationCmd:
    type: 'str'
    default: ''
    supported: true
    widget: 'activationCmd'
    description: >-
      Custom command executed on the firewall after the script has
      been copied. Leave empty to use the built-in activation.

  add_mgmt_ssh_rule_when_stoped:
    type: 'bool'
    default: false
    supported: false
    widget: 'add_mgmt_ssh_rule_when_stoped'
    description: >-
      Currently always-on whenever management SSH access is enabled. A
      separate toggle for the block/stop backup rule is on the roadmap.

  admUser:
    type: 'str'
    default: ''
    supported: true
    widget: 'ipt_user'
    description: >-
      SSH user name for uploading the generated script to the firewall.
      Leave empty to use the current system user.

  altAddress:
    type: 'str'
    default: ''
    supported: true
    widget: 'altAddress'
    description: >-
      Alternative address used for SCP/SSH if the primary management
      address is unreachable.

  bridging_fw:
    type: 'bool'
    default: false
    supported: true
    widget: 'bridge'
    description: >-
      Generate rules for a bridging (transparent) firewall.

  check_shading:
    type: 'bool'
    default: true
    supported: true
    widget: 'shadowing'
    description: >-
      Detect rules that are completely shadowed by earlier rules
      in the same access list and report a warning.

  clamp_mss_to_mtu:
    type: 'bool'
    default: false
    supported: true
    widget: 'clampMSStoMTU'
    description: >-
      Add a rule at the top of the policy that clamps the TCP MSS
      to the path MTU. Generation depends on IP forwarding settings
      in the host OS dialog.

  clear_unknown_interfaces:
    type: 'bool'
    default: false
    supported: true
    widget: 'clearUnknownInterfaces'
    description: >-
      Clear IP addresses and bring down interfaces that are not
      configured in FirewallFabrik.

  cmdline:
    type: 'str'
    default: ''
    supported: true
    widget: 'compilerArgs'
    description: >-
      Additional command-line arguments passed to the compiler.

  compiler:
    type: 'str'
    default: ''
    supported: true
    widget: 'compiler'
    description: >-
      Path to an alternative compiler binary. Leave empty to use
      the built-in compiler.

  configure_bonding_interfaces:
    type: 'bool'
    default: false
    supported: false
    widget: 'configure_bonding_interfaces'
    description: >-
      Not yet implemented. Reserved for cluster support. Modern setups
      configure bonding via NetworkManager or systemd-networkd outside
      the firewall script.

  configure_bridge_interfaces:
    type: 'bool'
    default: false
    supported: true
    widget: 'configure_bridge_interfaces'
    description: >-
      Configure bridge interfaces in the generated script
      using iproute2 (ip link).

  configure_interfaces:
    type: 'bool'
    default: false
    supported: true
    widget: 'configureInterfaces'
    description: >-
      Configure IP addresses on interfaces of the firewall machine
      as part of the generated script.

  configure_vlan_interfaces:
    type: 'bool'
    default: false
    supported: false
    widget: 'configure_vlan_interfaces'
    description: >-
      Not yet implemented. Reserved for cluster support. Modern setups
      configure VLANs via NetworkManager or systemd-networkd outside
      the firewall script.

  debug:
    type: 'bool'
    default: false
    supported: true
    widget: 'iptDebug'
    description: >-
      Turn on shell debugging (set -x) in the generated script
      for troubleshooting.

  drop_invalid:
    type: 'bool'
    default: false
    supported: true
    widget: 'dropInvalid'
    description: >-
      Drop packets that are associated with no known connection
      (conntrack state INVALID).

  epilog_script:
    type: 'text'
    default: ''
    supported: true
    widget: 'epilog_script'
    description: >-
      Shell commands appended after all firewall rules.
      Use for custom cleanup or final actions.

  firewall_dir:
    type: 'str'
    default: '/etc'
    supported: true
    widget: 'ipt_fw_dir'
    description: >-
      Directory on the firewall where the generated script will
      be stored.

  firewall_is_part_of_any_and_networks:
    type: 'bool'
    default: true
    supported: true
    widget: 'assumeFwIsPartOfAny'
    description: >-
      Assume the firewall machine is part of "any" and matching
      network objects. When enabled, the compiler generates rules
      for traffic to/from the firewall itself.

  flush_ruleset:
    type: 'bool'
    default: true
    supported: true
    widget: 'flushRuleset'
    description: >-
      When enabled (default), the generated script runs
      "nft flush ruleset" which removes ALL nftables rules before
      loading new rules. When disabled, the script only deletes and
      recreates the tables owned by FirewallFabrik, leaving rules
      created by other tools (e.g. Docker, CrowdSec, fail2ban)
      untouched.

  ignore_empty_groups:
    type: 'bool'
    default: false
    supported: true
    widget: 'emptyGroups'
    description: >-
      Silently ignore empty groups referenced in rules instead of
      reporting a compiler error.

  installScript:
    type: 'str'
    default: ''
    supported: true
    widget: 'installScript'
    description: >-
      Path to a custom installation script executed instead of the
      default SCP/SSH mechanism.

  installScriptArgs:
    type: 'str'
    default: ''
    supported: true
    widget: 'installScriptArgs'
    description: >-
      Arguments passed to the custom installation script.

  ip_path:
    type: 'str'
    default: '/sbin/ip'
    supported: true
    widget: ~
    description: >-
      Path to the ip command used for interface configuration
      in the generated script.

  ipv4_6_order:
    type: 'enum'
    default: 'ipv4_first'
    supported: true
    widget: 'ipv4before'
    values:
      - 'ipv4_first'
      - 'ipv6_first'
    description: >-
      Order in which IPv4 and IPv6 rules are generated in the
      output script.

  ipv6_neighbor_discovery:
    type: 'bool'
    default: false
    supported: false
    widget: 'ipv6NeighborDiscovery'
    description: >-
      Not yet implemented for nftables. ICMPv6 Neighbor Discovery is
      required by RFC 4861, IPv6 connectivity breaks without it.

  limit_suffix:
    type: 'enum'
    default: '/second'
    supported: false
    widget: 'logLimitSuffix'
    values:
      - '/second'
      - '/minute'
      - '/hour'
      - '/day'
    description: >-
      Not yet implemented for nftables. The nft language has a native
      "limit rate" directive that would be wired up here.

  limit_value:
    type: 'int'
    default: 0
    supported: false
    widget: 'logLimitVal'
    description: >-
      Not yet implemented for nftables. The nft language has a native
      "limit rate" directive that would be wired up here.

  load_modules:
    type: 'bool'
    default: true
    supported: false
    widget: 'loadModules'
    description: >-
      Not needed for nftables: nft loads required kernel modules on
      demand.

  local_nat:
    type: 'bool'
    default: false
    supported: true
    widget: 'localNAT'
    description: >-
      Enable support for NAT of locally originated connections
      (output chain DNAT rules).

  log_all:
    type: 'bool'
    default: false
    supported: true
    widget: 'logAll'
    description: >-
      Activate logging in all rules, overriding individual rule
      logging options. Use for debugging only.

  log_invalid:
    type: 'bool'
    default: false
    supported: true
    widget: 'logInvalid'
    description: >-
      Log packets in INVALID conntrack state before dropping them.
      Only effective when "Drop packets associated with no known
      connection" is also enabled.

  log_ip_opt:
    type: 'bool'
    default: false
    supported: false
    widget: 'logIPopt'
    description: >-
      Not yet implemented for nftables.

  log_level:
    type: 'enum'
    default: 'info'
    supported: true
    widget: 'logLevel'
    values:
      - ''
      - 'alert'
      - 'crit'
      - 'debug'
      - 'emerg'
      - 'error'
      - 'info'
      - 'notice'
      - 'warning'
    description: >-
      Syslog severity level for packets matched by logging rules.
      Leave empty to use the system default.

  log_prefix:
    type: 'str'
    default: 'RULE %N -- %A '
    supported: true
    widget: 'logprefix'
    description: >-
      Prefix string for log messages. Supported macros:
      %N = rule number, %A = action, %I = interface name,
      %C = chain name, %R = rule set name.

  log_tcp_opt:
    type: 'bool'
    default: false
    supported: false
    widget: 'logTCPopt'
    description: >-
      Not yet implemented for nftables.

  log_tcp_seq:
    type: 'bool'
    default: false
    supported: false
    widget: 'logTCPseq'
    description: >-
      Not yet implemented for nftables.

  manage_virtual_addr:
    type: 'bool'
    default: true
    supported: false
    widget: 'addVirtualsforNAT'
    description: >-
      Not yet implemented for nftables. Reserved for cluster support.

  mgmt_addr:
    type: 'str'
    default: ''
    supported: true
    widget: 'mgmt_addr'
    description: >-
      IP address of the management workstation allowed permanent
      SSH access.

  mgmt_ssh:
    type: 'bool'
    default: false
    supported: true
    widget: 'mgmt_ssh'
    description: >-
      Always permit SSH access from the management workstation
      with the address specified below.

  nft_path:
    type: 'str'
    default: '/usr/sbin/nft'
    supported: true
    widget: ~
    description: >-
      Path to the nft binary used in the generated script.

  output_file:
    type: 'str'
    default: 'fwf.sh'
    supported: true
    widget: 'outputFileName'
    description: >-
      Name of the generated output file. Leave empty to use
      the default name derived from the firewall object name.

  prolog_place:
    type: 'enum'
    default: 'top'
    supported: true
    widget: 'prologPlace'
    values:
      - 'top'
      - 'after_interfaces'
      - 'after_flush'
    description: >-
      Where in the generated script the prolog commands are
      inserted.

  prolog_script:
    type: 'text'
    default: ''
    supported: true
    widget: 'prolog_script'
    description: >-
      Shell commands inserted before the firewall rules.
      Use for custom initialization.

  scpArgs:
    type: 'str'
    default: ''
    supported: true
    widget: 'scpArgs'
    description: >-
      Additional arguments passed to scp when copying the script
      to the firewall.

  script_name_on_firewall:
    type: 'str'
    default: 'fwf.sh'
    supported: true
    widget: 'fileNameOnFw'
    description: >-
      Name of the script file on the firewall. Leave empty to
      use the same name as the output file.

  sshArgs:
    type: 'str'
    default: ''
    supported: true
    widget: 'sshArgs'
    description: >-
      Additional arguments passed to ssh when connecting to the
      firewall for installation.

  table_name:
    type: 'str'
    default: 'fwf'
    supported: true
    widget: 'tableName'
    placeholder: 'fwf'
    description: >-
      Base name for the nftables tables managed by FirewallFabrik.
      The compiler creates two tables: {name}_filter for packet
      filtering and {name}_nat for NAT rules. When "Flush entire
      ruleset" is disabled, only these tables are deleted and
      recreated, so rules created by other tools (e.g. Docker,
      CrowdSec, fail2ban) remain untouched.

  use_iptables_restore:
    type: 'bool'
    default: false
    supported: false
    widget: 'iptablesRestoreActivation'
    description: >-
      Not needed for nftables: the nft compiler always loads the
      ruleset atomically via "nft -f /dev/stdin".

  use_kerneltz:
    type: 'bool'
    default: false
    supported: false
    widget: 'useKernelTz'
    description: >-
      No equivalent in nftables. "meta hour"/"meta day" matching always
      uses the kernel timezone, no UTC mode to switch to.

  use_m_set:
    type: 'bool'
    default: false
    supported: false
    widget: 'useModuleSet'
    description: >-
      Not needed for nftables: sets are a native feature of the nft
      language.

  use_NFLOG:
    type: 'bool'
    default: false
    supported: true
    widget: 'useNFLOG'
    description: >-
      Use the NFLOG target for logging instead of LOG.
      NFLOG sends packets via netlink to a userspace daemon
      (ulogd2, rsyslog, syslog-ng) for flexible log routing.
      In nftables, generates 'log group N' instead of plain 'log'.

  use_numeric_log_levels:
    type: 'bool'
    default: false
    supported: false
    widget: 'logNumsyslog'
    description: >-
      Not yet implemented for nftables.

  ulog_cprange:
    type: 'int'
    default: 0
    supported: false
    widget: 'cprange'
    description: >-
      Not configurable through nftables. "log group N" delegates to
      ulogd2, rsyslog or syslog-ng, where the copy range is set in
      those daemons' configuration files.

  ulog_nlgroup:
    type: 'int'
    default: 1
    supported: true
    widget: 'nlgroup'
    description: >-
      NFLOG netlink multicast group number (1-65535).
      Used when use_NFLOG is enabled.

  ulog_qthreshold:
    type: 'int'
    default: 1
    supported: false
    widget: 'qthreshold'
    description: >-
      Not configurable through nftables. "log group N" delegates to
      ulogd2, rsyslog or syslog-ng, where the queue threshold is set in
      those daemons' configuration files.

  verify_interfaces:
    type: 'bool'
    default: true
    supported: true
    widget: 'verifyInterfaces'
    description: >-
      Verify that all interfaces referenced in the policy exist
      on the firewall machine before loading the rules.
